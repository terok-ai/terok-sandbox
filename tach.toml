exclude = [
    "**/__pycache__",
    "**/tests/**",
    "build",
    "dist",
    ".venv",
    "docs",
    # Back-compat shims at the pre-vault-unification import paths.
    # Each is a one-line star re-export from the new ``vault.{store,ssh,daemon}.*``
    # home; removed once cross-repo consumers (terok, terok-executor) update.
    "src/terok_sandbox/credentials",
    "src/terok_sandbox/vault/lifecycle.py",
    "src/terok_sandbox/vault/token_broker.py",
    "src/terok_sandbox/vault/audit.py",
    "src/terok_sandbox/vault/constants.py",
    "src/terok_sandbox/vault/ssh_signer.py",
    "src/terok_sandbox/vault/scope_sockets.py",
]

source_roots = ["src"]
exact = true
forbid_circular_dependencies = true
ignore_type_checking_imports = true

# ── Layers ─────────────────────────────────────────────────
#
# Strict ordering: higher layers may import from lower layers
# (implicit), never the reverse.  Same-layer imports require
# explicit depends_on.
#
#   surface      CLI, command registry, sandbox facade
#   core         Business logic: shield, gate mgmt, credential mgmt, runtime
#   foundation   Pure data, standalone helpers, isolated servers

layers = ["surface", "core", "foundation"]

# ── Foundation ─────────────────────────────────────────────
# Zero-dependency primitives, standalone servers, pure data.

# Shared repo-local helpers (fs, logging, templates, naming conventions)
[[modules]]
path = "terok_sandbox._util"
layer = "foundation"
utility = true

# Domain-agnostic layered config merge engine — zero internal deps
[[modules]]
path = "terok_sandbox.config_stack"
layer = "foundation"
depends_on = []

# Platform-aware path resolution — uses config_stack for layered config merge
[[modules]]
path = "terok_sandbox.paths"
layer = "foundation"
depends_on = [
    "terok_sandbox.config_stack",
]

# Shared port registry — depends on paths for configurable registry dir
[[modules]]
path = "terok_sandbox.port_registry"
layer = "foundation"
depends_on = ["terok_sandbox.paths"]

# Setup-stamp primitive — JSON marker + version comparison; reads tracked
# package versions via importlib.metadata, writes under namespace_state_dir.
[[modules]]
path = "terok_sandbox.setup_stamp"
layer = "foundation"
depends_on = ["terok_sandbox.paths"]

# Stage-line renderer — colour palette + column width.  Zero internal
# deps; imported by _setup and by downstream frontends via the package
# re-export.
[[modules]]
path = "terok_sandbox._stage"
layer = "foundation"
depends_on = []

# Pydantic schema for the sandbox-owned slice of config.yml — pure data
# validation, composed by terok-executor and terok into the global config.
[[modules]]
path = "terok_sandbox.config_schema"
layer = "foundation"
depends_on = [
    "terok_sandbox.paths",
]

# Configuration dataclass — same-layer dep on paths + port_registry,
# plus vault.store.db for the scope-name guard reused by per-scope
# socket paths.  Reads ``services.mode`` through ``config_schema`` so
# standalone sandbox and embedded (terok) paths share one validator.
[[modules]]
path = "terok_sandbox.config"
layer = "foundation"
depends_on = [
    "terok_sandbox.paths",
    "terok_sandbox.port_registry",
    "terok_sandbox.vault.store.db",
    "terok_sandbox.vault.store.encryption",
    "terok_sandbox.config_schema",
]

# Health check protocol + sandbox-level diagnostics
[[modules]]
path = "terok_sandbox.doctor"
layer = "foundation"
depends_on = [
    "terok_sandbox.config",
    "terok_sandbox.paths",
    "terok_sandbox.vault.store.encryption",
    "terok_sandbox.vault.daemon.constants",
]

# ── Vault: store, ssh, daemon ──────────────────────────────
# Three sub-packages under one namespace.  store/ is the at-rest data
# layer (SQLCipher DB + passphrase chain); ssh/ holds the SSH story
# end-to-end (keypair I/O, scope manager, agent-protocol signer,
# scope sockets); daemon/ is the long-running process and its lifecycle.

[[modules]]
path = "terok_sandbox.vault"
layer = "foundation"
depends_on = []

# Vault.store — at-rest data layer.
[[modules]]
path = "terok_sandbox.vault.store"
layer = "foundation"
depends_on = []

[[modules]]
path = "terok_sandbox.vault.store.db"
layer = "foundation"
depends_on = [
    "terok_sandbox.vault.store.migrations",
    "terok_sandbox.vault.store.encryption",
]

[[modules]]
path = "terok_sandbox.vault.store.migrations"
layer = "foundation"
depends_on = []

[[modules]]
path = "terok_sandbox.vault.store.encryption"
layer = "foundation"
depends_on = ["terok_sandbox.vault.store.systemd_creds"]

[[modules]]
path = "terok_sandbox.vault.store.systemd_creds"
layer = "foundation"
depends_on = []

# Vault.ssh — keypair I/O + scope manager + agent protocol + sockets.
[[modules]]
path = "terok_sandbox.vault.ssh"
layer = "foundation"
depends_on = []

[[modules]]
path = "terok_sandbox.vault.ssh.signer"
layer = "foundation"
depends_on = [
    "terok_sandbox.vault.store.db",
    "terok_sandbox.vault.daemon.token_broker",
]

[[modules]]
path = "terok_sandbox.vault.ssh.scope_sockets"
layer = "foundation"
depends_on = [
    "terok_sandbox.vault.ssh.signer",
    "terok_sandbox.vault.store.db",
    "terok_sandbox.config",
]

# Vault.daemon — the long-running process: lifecycle, broker, audit.
[[modules]]
path = "terok_sandbox.vault.daemon"
layer = "foundation"
depends_on = []

[[modules]]
path = "terok_sandbox.vault.daemon.token_broker"
layer = "foundation"
depends_on = [
    "terok_sandbox.vault.daemon.audit",
    "terok_sandbox.vault.daemon.constants",
    "terok_sandbox.vault.store.db",
    "terok_sandbox.vault.store.encryption",
    "terok_sandbox.config",
]

[[modules]]
path = "terok_sandbox.vault.daemon.audit"
layer = "foundation"
depends_on = []

[[modules]]
path = "terok_sandbox.vault.daemon.constants"
layer = "foundation"
depends_on = []

# VaultStatus dataclass + VaultUnreachableError exception — the vocabulary
# every renderer (sandbox CLI, executor, terok TUI, doctor) builds against.
[[modules]]
path = "terok_sandbox.vault.daemon.status"
layer = "foundation"
depends_on = ["terok_sandbox.vault.store.encryption"]

# Gate standalone HTTP server — zero internal imports
[[modules]]
path = "terok_sandbox.gate.server"
layer = "foundation"
depends_on = []

# Gate package root — same-layer dep on gate.server (__main__.py re-export)
[[modules]]
path = "terok_sandbox.gate"
layer = "foundation"
depends_on = [
    "terok_sandbox.gate.server",
]

# ── Core ───────────────────────────────────────────────────
# Business logic.  Foundation imports are implicit via layers.
# Only same-layer (core↔core) deps need explicit declaration.

# Container runtime
[[modules]]
path = "terok_sandbox.runtime"
layer = "core"
depends_on = []

# Shield adapter
[[modules]]
path = "terok_sandbox.shield"
layer = "core"
depends_on = []

# Gate token CRUD
[[modules]]
path = "terok_sandbox.gate.tokens"
layer = "core"
depends_on = []

# Gate server lifecycle — same-layer dep on gate.tokens
[[modules]]
path = "terok_sandbox.gate.lifecycle"
layer = "core"
depends_on = [
    "terok_sandbox.gate.tokens",
]

# Vault SSH manager — user-facing SSHManager façade over the store
# and the keypair primitives.
[[modules]]
path = "terok_sandbox.vault.ssh.manager"
layer = "core"
depends_on = ["terok_sandbox.vault.ssh.keypair"]

[[modules]]
path = "terok_sandbox.vault.ssh.keypair"
layer = "core"
depends_on = []

# Git gate mirror management
[[modules]]
path = "terok_sandbox.gate.mirror"
layer = "core"
depends_on = []

# Vault daemon lifecycle (start/stop, systemd units, status probes).
# ``status`` is implicitly imported from a lower layer (foundation),
# so no explicit dep is needed.
[[modules]]
path = "terok_sandbox.vault.daemon.lifecycle"
layer = "core"
depends_on = []

# ── Surface ────────────────────────────────────────────────
# Orchestration + CLI.  Core and foundation imports are implicit.
# Only same-layer (surface↔surface) deps need explicit declaration.

# Sandbox facade
[[modules]]
path = "terok_sandbox.sandbox"
layer = "surface"
depends_on = []

# Command registry — one module per subsystem under the package, plus a
# shared types module.  Each submodule keeps its own ``*_COMMANDS``
# tuple; the package ``__init__`` assembles ``COMMANDS`` from them.
[[modules]]
path = "terok_sandbox.commands"
layer = "surface"
depends_on = [
    "terok_sandbox.commands.credentials",
    "terok_sandbox.commands.doctor",
    "terok_sandbox.commands.gate",
    "terok_sandbox.commands.launch",
    "terok_sandbox.commands.sandbox",
    "terok_sandbox.commands.shield",
    "terok_sandbox.commands.ssh",
    "terok_sandbox.commands.vault",
]

# Shared CommandDef / ArgDef / KeyRow vocabulary.  Foundation-level so
# subsystem modules in the surface layer can all import from it.
[[modules]]
path = "terok_sandbox.commands._types"
layer = "foundation"
depends_on = []

[[modules]]
path = "terok_sandbox.commands.sandbox"
layer = "surface"
depends_on = [
    "terok_sandbox._setup",
    "terok_sandbox.commands.credentials",
]

[[modules]]
path = "terok_sandbox.commands.gate"
layer = "surface"
depends_on = []

[[modules]]
path = "terok_sandbox.commands.shield"
layer = "surface"
depends_on = []

[[modules]]
path = "terok_sandbox.commands.vault"
layer = "surface"
depends_on = []

[[modules]]
path = "terok_sandbox.commands.ssh"
layer = "surface"
depends_on = []

[[modules]]
path = "terok_sandbox.commands.doctor"
layer = "surface"
depends_on = []

[[modules]]
path = "terok_sandbox.commands.credentials"
layer = "surface"
depends_on = []

[[modules]]
path = "terok_sandbox.commands.launch"
layer = "surface"
depends_on = [
    "terok_sandbox.launch",
]

# Round-trip YAML writer for setup-time config.yml edits.
[[modules]]
path = "terok_sandbox._yaml"
layer = "foundation"
depends_on = []

# Per-container wiring composer — `prepare`/`run`/`cleanup`.  Surface
# because it produces operator-facing podman args + drives token mints
# and shield rules in one place.
[[modules]]
path = "terok_sandbox.launch"
layer = "surface"
depends_on = [
    "terok_sandbox.sandbox",
]

# Sandbox-wide setup orchestration — phase runner invoked by the
# aggregator in commands.py.  Surface layer because it produces the
# operator-facing install output and reaches across shield / vault /
# gate / clearance.
[[modules]]
path = "terok_sandbox._setup"
layer = "surface"
depends_on = []

# CLI entry point — same-layer dep on commands
[[modules]]
path = "terok_sandbox.cli"
layer = "surface"
depends_on = [
    "terok_sandbox.commands",
]

# Package root — same-layer deps on surface peers
[[modules]]
path = "terok_sandbox"
layer = "surface"
depends_on = [
    "terok_sandbox.commands",
    "terok_sandbox.sandbox",
]
