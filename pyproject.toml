"[build-system]\nrequires = [\"poetry-core>=1.9.0\", \"poetry-dynamic-versioning>=1.0.0,<2.0.0\"]\nbuild-backend = \"poetry_dynamic_versioning.backend\"\n\n[tool.poetry]\nname = \"terok-sandbox\"\nversion = \"0.0.16\"\ndescription = \"Hardened Podman container runner with gate server and shield integration\"\nreadme = \"README.md\"\nlicense = \"Apache-2.0\"\nauthors = [\"terok maintainers\"]\nkeywords = [\"podman\", \"containers\", \"sandbox\", \"security\", \"isolation\"]\nclassifiers = [\n  \"Programming Language :: Python :: 3\",\n  \"License :: OSI Approved :: Apache Software License\",\n  \"Environment :: Console\",\n  \"Operating System :: POSIX :: Linux\",\n  \"Topic :: System :: Systems Administration\",\n]\n\npackages = [\n  { include = \"terok_sandbox\", from = \"src\" },\n]\n\n[tool.poetry.dependencies]\npython = \">=3.12,<4.0\"\nterok-shield = {git = \"https://github.com/terok-ai/terok-shield.git\", branch = \"feat/dnsmasq-oci-hook\"}\nplatformdirs = \">=4.0\"\naiohttp = \">=3.9\"\n\n[tool.poetry.group.dev.dependencies]\nruff = \">=0.8\"\nbandit = \">=1.7\"\ndocstr-coverage = \"^2.3.2\"\ncomplexipy = \">=5.0\"\nvulture = \">=2.12\"\nreuse = \"^6.2.0\"\ntach = \"^0.34.0\"\n\n[tool.poetry.group.test.dependencies]\npytest = \">=7.0\"\npytest-asyncio = \">=0.24\"\npytest-cov = \">=4.0\"\npytest-timeout = \">=2.0\"\n\n[tool.poetry.group.docs.dependencies]\nmkdocs = \">=1.5,<2\"\nmkdocs-material = \">=9.0\"\nmkdocstrings = {extras = [\"python\"], version = \">=0.24\"}\nmkdocs-literate-nav = \">=0.6\"\nmkdocs-section-index = \">=0.3\"\nmkdocs-terok = {url = \"https://github.com/terok-ai/mkdocs-terok/releases/download/v0.3.0/mkdocs_terok-0.3.0-py3-none-any.whl\"}\n\n[tool.poetry.scripts]\nterok-sandbox = \"terok_sandbox.cli:main\"\nterok-gate = \"terok_sandbox.gate.server:main\"\nterok-credential-proxy = \"terok_sandbox.credential_proxy.server:main\"\n\n[tool.pytest.ini_options]\ntestpaths = [\"tests/unit\", \"tests/integration\"]\npython_files = [\"test_*.py\"]\npython_classes = [\"Test*\", \"*Tests\"]\npython_functions = [\"test_*\"]\naddopts = \"-v --tb=short\"\nmarkers = [\n  \"needs_podman: requires podman on the host\",\n  \"needs_credential_proxy: credential proxy integration (real server + DB)\",\n]\nasyncio_mode = \"auto\"\n\n[tool.ruff]\ntarget-version = \"py312\"\nline-length = 100\nsrc = [\"src\", \"tests\"]\n\n[tool.ruff.lint]\nselect = [\n  \"E\",      # pycodestyle errors\n  \"W\",      # pycodestyle warnings\n  \"F\",      # pyflakes\n  \"I\",      # isort\n  \"B\",      # flake8-bugbear\n  \"C4\",     # flake8-comprehensions\n  \"UP\",     # pyupgrade\n  \"SIM\",    # flake8-simplify\n]\nignore = [\n  \"E501\",   # line too long (handled by formatter)\n  \"B904\",   # raise from in except\n  \"SIM102\", # nested if statements\n  \"SIM105\", # contextlib.suppress vs try/except/pass\n  \"SIM108\", # use ternary operator\n  \"SIM117\", # nested with statements\n]\n\n[tool.ruff.lint.per-file-ignores]\n\"tests/**\" = [\"E402\"]\n\n[tool.ruff.lint.isort]\nknown-first-party = [\"terok_sandbox\"]\ncombine-as-imports = true\n\n[tool.ruff.format]\nquote-style = \"double\"\nindent-style = \"space\"\ndocstring-code-format = true\n\n[tool.poetry-dynamic-versioning]\nenable = true\nvcs = \"git\"\npattern = \"^v(?P<base>\\\\d+\\\\.\\\\d+\\\\.\\\\d+)$\"\nstyle = \"pep440\"\n\n[tool.poetry-dynamic-versioning.substitution]\nfolders = [{path = \"src\"}]\n"