# Pin third-party actions to full commit SHAs for supply-chain security.
# GitHub-owned actions (actions/*) may use version tags.
#
# Coverage handoff contract (well-known address):
#   workflow=analysis.yml  job=unit-tests  artifact=coverage  contains reports/coverage.{json,xml}
#
# reports/coverage.json drives mkdocs-terok's code-coverage treemap. The unit
# tests workflow already produces it, so the docs build downloads that artifact
# instead of paying for a second `make test-unit`. The coverage JSON itself is
# throwaway: only the rendered SVG is published.
#
# Freshness policy:
#   master ref  -> require the same-SHA Tests & Analysis run to complete
#                  successfully (with a 20m wait). The published treemap must
#                  match the published code.
#   other refs  -> try same-SHA opportunistically, fall back immediately to
#                  the latest successful master run. PR builds are not
#                  published, so a one-merge-stale treemap is acceptable in
#                  exchange for never-pending PR feedback.
name: Documentation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  # release.yml calls this after a successful PyPI publish: the same build
  # runs on the tag ref and lands in the versioned tree as /<minor>/ with
  # the `latest` alias, instead of /dev/.
  workflow_call:
    inputs:
      release:
        description: "Publish as the release version derived from the tag ref (instead of dev)"
        type: boolean
        default: false

# Concurrency is per ref: GitHub keeps only the newest *pending* run
# per group, so a shared group let PR builds silently evict queued
# master deploys. Superseded PR builds are cancelled outright; pushes
# never are. Actual Pages deployments are serialized by the job-level
# group inside publish-versioned-docs.yml.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  actions: read

jobs:
  # The build lives in mkdocs-terok's docs-build.yml (reusable across
  # the package family): uv sync, scc, the coverage-artifact handoff,
  # strict properdocs build, docs-site upload.
  build:
    if: github.repository == 'terok-ai/terok-sandbox'
    permissions:
      contents: read
      actions: read
    uses: terok-ai/mkdocs-terok/.github/workflows/docs-build.yml@v0.8.0a2
    with:
      release: ${{ inputs.release == true }}

  publish:
    if: github.repository == 'terok-ai/terok-sandbox' && (github.ref == 'refs/heads/master' || inputs.release)
    needs: build
    permissions:
      contents: write
      pages: write
      id-token: write
    uses: terok-ai/mkdocs-terok/.github/workflows/publish-versioned-docs.yml@v0.8.0a2
    with:
      release: ${{ inputs.release == true }}
