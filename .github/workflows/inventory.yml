# Calls the reusable inventory-publish workflow on every master merge,
# in parallel with `docs.yml`.  Decoupled lifecycles: a failed Pages
# deploy doesn't stale the inventory bucket, and an inventory hiccup
# doesn't stale the docs site.  See terok-ai/mkdocs-terok#58 for the
# full design.

name: Publish inventory

on:
  push:
    branches: [master]
  workflow_dispatch:

# `contents: read` here is required so the called reusable workflow can
# request the same — GitHub Actions rejects a called workflow that asks
# for permissions outside the caller's grant, which manifests as
# ``startup_failure`` with no jobs spawned.
permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'terok-ai/terok-sandbox' && github.ref == 'refs/heads/master'
    uses: terok-ai/mkdocs-terok/.github/workflows/publish-inventory.yml@v0.8.0a1
    secrets:
      INVENTORY_WRITE_TOKEN: ${{ secrets.INVENTORY_WRITE_TOKEN }}
