# Pin third-party actions to full commit SHAs for supply-chain security.
# GitHub-owned actions (actions/*) may use version tags.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  reuse:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: REUSE compliance check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6

  lint:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ruff lint
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          args: check

      - name: Ruff format check
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          args: format --check

  docstring-coverage:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install -r .github/requirements-ci.txt

      - name: Check docstring coverage
        run: docstr-coverage src/terok_sandbox/ --fail-under=95

  dead-code:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install -r .github/requirements-ci.txt

      - name: Check for dead code
        run: vulture src/terok_sandbox/ vulture_whitelist.py --min-confidence 80

  tach:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install -r .github/requirements-ci.txt

      - name: Check module boundaries
        run: tach check

  lint-imports:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.4.1"
          virtualenvs-create: true
          virtualenvs-in-project: true
          plugins: poetry-dynamic-versioning[plugin]

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-lint-imports-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}

      - name: Install project
        run: poetry install --with dev --no-interaction

      - name: Check cross-package import boundaries
        run: poetry run lint-imports

  security:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install -r .github/requirements-ci.txt

      - name: Run SAST scan
        run: bandit -r src/terok_sandbox/ -ll

  # Static type checking via mypy.  Installs the package + main deps so
  # mypy can read real signatures for third-party types instead of
  # falling back to ``Any`` (via ``ignore_missing_imports = true``).
  typecheck:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      # ``persist-credentials: false`` skips installing the
      # workflow GITHUB_TOKEN as a git http.extraheader for
      # github.com.  Without it, ``pip install -e .`` below
      # fails to clone the ``terok-clearance`` git+ dep from the
      # sliwowitz/ fork: the workflow's token is scoped to
      # ``terok-ai/terok-sandbox`` and gets 401 on sliwowitz/*,
      # at which point git prompts for credentials and the
      # non-interactive runner aborts.  Anonymous HTTPS clone
      # works fine for the public fork.
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project + tools
        run: |
          pip install -e .
          pip install -r .github/requirements-ci.txt

      - name: Run mypy
        run: mypy src/terok_sandbox/

  readme-check:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify README renders for PyPI
        run: |
          pip install 'readme_renderer[md]'
          python -m readme_renderer README.md --format md
