# Pin third-party actions to full commit SHAs for supply-chain security.
# GitHub-owned actions (actions/*) may use version tags.
#
# The static-check battery lives in terok-util's fleet-checks.yml
# (reusable across the package family); only the repo-specific
# lint-imports job stays local.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  checks:
    uses: terok-ai/terok-util/.github/workflows/fleet-checks.yml@v0.3.0a2

  lint-imports:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --locked

      - name: Check cross-package import boundaries
        run: uv run --no-sync lint-imports
