# Pin third-party actions to full commit SHAs for supply-chain security.
# GitHub-owned actions (actions/*) may use version tags.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  reuse:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: REUSE compliance check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6

  lint:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Ruff lint
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          args: check

      - name: Ruff format check
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          args: format --check

      - name: ASCII-only pyproject
        run: |
          ! LC_ALL=C grep -nP '[^\x00-\x7F]' pyproject.toml

  docstring-coverage:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install tools
        run: uv sync --locked --only-group dev

      - name: Check docstring coverage
        run: uv run --no-sync docstr-coverage src/terok_sandbox/ --fail-under=95

  dead-code:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install tools
        run: uv sync --locked --only-group dev

      - name: Check for dead code
        run: uv run --no-sync vulture src/terok_sandbox/ vulture_whitelist.py --min-confidence 80

  tach:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install tools
        run: uv sync --locked --only-group dev

      - name: Check module boundaries
        run: uv run --no-sync tach check

  lint-imports:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --locked

      - name: Check cross-package import boundaries
        run: uv run --no-sync lint-imports

  security:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install tools
        run: uv sync --locked --only-group dev

      - name: Run SAST scan
        run: uv run --no-sync bandit -r src/terok_sandbox/ -ll

  # Static type checking via mypy.  Installs the package + main deps so
  # mypy can read real signatures for third-party types instead of
  # falling back to ``Any`` (via ``ignore_missing_imports = true``).
  typecheck:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install project + tools
        run: uv sync --locked

      - name: Run mypy
        run: uv run --no-sync mypy src/terok_sandbox/

  readme-check:
    if: github.repository == 'terok-ai/terok-sandbox'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Verify README renders for PyPI
        run: uv run --no-project --with 'readme-renderer[md]' python -m readme_renderer README.md --format md
