site_name: terok-sandbox
site_description: Hardened Podman container runner with gate server and shield integration
site_url: https://terok-ai.github.io/terok-sandbox
repo_url: https://github.com/terok-ai/terok-sandbox
repo_name: terok-ai/terok-sandbox

theme:
  name: material
  font:
    text: Ubuntu
    code: Ubuntu Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://terok-ai.github.io/terok/objects.inv
            - https://terok-ai.github.io/terok-executor/objects.inv
            - https://terok-ai.github.io/terok-shield/objects.inv
            - https://terok-ai.github.io/terok-clearance/objects.inv
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_if_no_docstring: true
            members_order: source
            merge_init_into_class: true
  - terok:
      ci_map: true
      ci_map_path: ci_map.md
      quality_report: true
      quality_report_path: quality_report.md
      quality_report_codecov_repo: terok-ai/terok-sandbox
      ref_pages: true
      ref_pages_path: reference
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Developer Guide:
    - Code Metrics: quality_report.md
    - CI Workflow Map: ci_map.md
  - API Reference: reference/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/terok-ai/terok-sandbox

extra_css:
  - https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=Ubuntu+Mono:wght@400;700&display=swap
